<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Resource Hints for Performance -->
    <link rel="preconnect" href="https://www.tsfinanse.com" />
    <link rel="dns-prefetch" href="https://unpkg.com" />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />

    <!-- SEO meta tags managed by React Helmet per page -->
    <!-- Bing Webmaster Tools verification (replace PLACEHOLDER after registration) -->
    <meta name="msvalidate.01" content="PLACEHOLDER" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="TS Finanse Blog" href="https://www.tsfinanse.com/rss.xml" />
    <meta name="theme-color" content="#D4AF7A" />

    <!-- WebSite Schema for Google Sitelinks Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TS Finanse",
      "url": "https://www.tsfinanse.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.tsfinanse.com/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Netlify Identity Widget -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </body>
</html>
